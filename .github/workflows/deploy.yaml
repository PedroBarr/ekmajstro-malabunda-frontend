name: Despliegue a GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Encapsular el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install flet

      - name: Construir la distribución
        run: |
          flet publish src/main.py --base-url /ekmajstro-malabunda-frontend/
      
      - name: Agregar archivo 404.html
        run: cp src/dist/index.html src/dist/404.html

      - name: Desplegar a GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: src/dist
          branch: gh-pages